```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Chloo 🎉</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

/* Floating circles background */
body::before, body::after {
    content: '';
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    animation: float 6s infinite alternate ease-in-out;
}

body::after {
    width: 200px;
    height: 200px;
    bottom: 10%;
    right: 10%;
    animation-duration: 8s;
}

@keyframes float {
    from { transform: translateY(0px); }
    to { transform: translateY(-50px); }
}

/* Card */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    animation: fadeIn 2s ease;
}

/* Glow text */
h1 {
    font-size: 2.5rem;
    font-weight: 600;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff6ec4;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 20px #ff6ec4, 0 0 30px #ff6ec4; }
}

p {
    margin-top: 15px;
    font-size: 1.2rem;
    opacity: 0.9;
}

/* Button */
button {
    margin-top: 25px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: #ff6ec4;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1493;
    transform: scale(1.1);
}

/* Fade in */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Confetti effect */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: white;
    top: -10px;
    animation: fall linear infinite;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>🎉 Happy Birthday Chloo 💖</h1>
    <p>Wishing you endless happiness, love, and smiles 🫂✨</p>
    <button onclick="showMessage()">Click Surprise 🎁</button>
</div>

<script>
function showMessage() {
    alert("You are special! 🫂💖 Enjoy your day Chloo 🎂🎉");
}

/* Create confetti */
for (let i = 0; i < 50; i++) {
    let confetti = document.createElement("div");
    confetti.classList.add("confetti");
    confetti.style.left = Math.random() * 100 + "vw";
    confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(confetti);
}
</script>

</body>
</html>
